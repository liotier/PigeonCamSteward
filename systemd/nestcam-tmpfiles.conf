
# Install to /etc/tmpfiles.d/nestcam.conf, or apply immediately with:
#   sudo systemd-tmpfiles --create systemd/nestcam-tmpfiles.conf
#
# Creates the shared runtime directory that nestcam-stream.sh,
# nestcam-watchdog.sh, nestcam-status-check.sh, and nestcam-rotate.sh all
# use for ffmpeg's -progress file (FR7) and their own small state/marker
# files. Deliberately not a per-unit systemd RuntimeDirectory=, since that
# ties the directory's lifetime to a single unit; several independent
# units share this one and any of them may be the first to start.
d /run/nestcam 0750 root root -
