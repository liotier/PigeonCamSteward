# PigeonCamSteward configuration template.
#
# Copy this file to config.yaml (next to it, or to /etc/pigeoncam/config.yaml
# for a systemd-managed deployment) and edit it. config.yaml is git-ignored;
# never commit a real deployment's copy.
#
# Every bin/pigeoncam-*.sh script reads its tunables from here via `yq`
# (Debian/Ubuntu package "yq" - the kislyuk/yq wrapper around jq, NOT
# mikefarah/yq; same filter syntax as jq). Validate this file parses with:
#   yq . config.yaml >/dev/null && echo OK

camera:
  device: /dev/pigeoncam            # stable udev symlink, not /dev/videoN - see udev/99-pigeoncam.rules.example
  input_format: mjpeg             # mjpeg, not yuyv - see docs/TROUBLESHOOTING.md
  resolution: "1920x1080"
  framerate: 30
  thread_queue_size: 512          # ffmpeg's -thread_queue_size on the v4l2 input, ahead of
                                   # the MJPEG software decode (SPEC.md Appendix A). Raise it
                                   # if ffmpeg logs "Thread message queue blocking" under load.

encode:
  preset: veryfast
  tune: ""                        # empty = none. "zerolatency" was field-tested and works,
                                   # but costs compression efficiency (disables lookahead)
                                   # for a latency benefit that is irrelevant to this
                                   # content - nobody needs sub-second latency on a nest.
                                   # Leave empty unless CPU headroom is tight.
  bitrate_kbps: 6000
  maxrate_kbps: 6000
  bufsize_kbps: 12000

audio:
  mode: synthetic                 # synthetic | real | off - see SPEC.md §3 before using "off"
  synthetic_amplitude: 0.001
  sample_rate: 48000               # also used for `real` mode - match your actual device's
                                   # native rate (`pactl list sources`) if you switch to real,
                                   # rather than leaving this at the synthetic default
  bitrate_kbps: 128                # AAC -b:a (SPEC.md Appendix A). This is a nest cam, not
                                   # a music stream - 128 is already generous for either the
                                   # synthetic noise floor or a real ambient-audio source.
  real_source: ""                 # e.g. alsa_input.usb-...analog-stereo (Pulse) - only used if mode: real
  real_source_user: ""            # system username whose PipeWire/PulseAudio session owns real_source -
                                   # only used if mode: real. Every unit in this project runs as root
                                   # (FR6), which has no audio session of its own; PipeWire/PulseAudio
                                   # sessions are per-user, so leave this empty ONLY if you've separately
                                   # arranged for root to have its own working session (uncommon). The
                                   # normal case: set this to whichever logged-in user's `pactl list
                                   # sources short` actually lists real_source. See docs/TROUBLESHOOTING.md
                                   # "Real audio mode" for the loginctl enable-linger step this may need.

youtube:
  ingest_url: "rtmps://a.rtmps.youtube.com/live2"   # RTMPS, not RTMP - click the lock icon in Studio
  stream_key_file: /etc/pigeoncam/stream_key           # chmod 600, never in git
  rotation:
    mode: restart                 # restart (FR14, default, no credentials needed) | api (FR15, Tier 2 - see tier2: below)
    interval: "11h45m"
    min_gap_seconds: 150          # restart mode only: deliberate stop->start gap.
                                   # Field-measured: ~100s reliably forces a new
                                   # broadcast; shorter gaps resume the old one and
                                   # do NOT reset the 12h archive clock. Keep margin.

archive:
  enabled: true
  segment_dir: /var/lib/pigeoncam/archive
  segment_length_seconds: 3600
  segment_format: mpegts           # crash-tolerant; see FR10. mp4 loses the
                                   # in-progress segment on any crash.
  daytime_start: "04:00"
  daytime_end: "20:30"
  daytime_keep_minutes: 60         # minutes retained per hour, 1-60, summed across
                                   # that hour's segments (restarts split hours into
                                   # several files - see FR11), oldest-first
  nighttime_discard: true          # false: trim nighttime hours to daytime_keep_minutes
                                   # instead of discarding them outright (still no separate
                                   # nighttime budget key - same minutes-per-hour value)

# notify_command (optional, empty = disabled): a command run whenever a
# genuine escalation happens - a USB-level device reset (FR7b), Tier 2 API
# recovery (FR7e), or its last-resort "manual Studio intervention may be
# required" case - not on every routine automatic restart, which would be
# too noisy for a notification channel to stay useful. Invoked as
# `sh -c "$notify_command" sh LABEL MESSAGE`, so LABEL/MESSAGE are
# available as $1/$2 inside your command if you reference them (e.g. a
# one-liner piping into curl/mail/notify-send); anything more elaborate is
# easiest as your own small wrapper script pointed to here. Best-effort:
# a failing or slow (>10s) notify_command is logged as a warning but never
# affects the escalation itself.
notify_command: ""

watchdog:
  check_interval_seconds: 30
  stall_timeout_seconds: 60
  progress_file: /run/pigeoncam/progress   # ffmpeg -progress target; see FR7. Also
                                          # fixes the shared runtime directory
                                          # (/run/pigeoncam) every Tier 1 script uses
                                          # for its own state/marker files.
  usb_reset:
    enabled: true
    escalate_after_restarts: 1      # plain restarts to try before escalating
    method: uhubctl                 # uhubctl | unbind | usbreset - starting preference;
                                     # falls through uhubctl -> unbind -> usbreset from
                                     # whichever is configured, per FR7b's fixed order
    hub_location: ""                # uhubctl -l value, only used if method: uhubctl
    port: ""                        # port number on that hub
    usb_path: ""                    # bus-port id (e.g. "3-4.1.4"), used by unbind/bind
                                     # and usbreset fallbacks. Leave empty to derive it
                                     # at runtime from camera.device's udev/sysfs path
                                     # instead of hardcoding a bus number that can change
                                     # across reboots even when the physical port doesn't.
    cooldown_seconds: 300           # minimum time between two USB-level resets; a stall
                                     # a reset genuinely can't fix would otherwise
                                     # re-trigger FR7b every other watchdog check
                                     # indefinitely. Blocked escalations still fall back
                                     # to a plain service restart, they just don't
                                     # re-trigger the more disruptive device reset.

external_check:
  enabled: true
  method: yt-dlp                    # yt-dlp (no credentials) | api (Tier 2 quota-based alternative,
                                     # NOT IMPLEMENTED - FR7c describes it as secondary to Tier 2's two
                                     # core deliverables (api-mode rotation, FR7e recovery), both of
                                     # which this project does implement; setting this to `api` makes
                                     # bin/pigeoncam-status-check.sh log a clear error and treat every poll as
                                     # indeterminate rather than silently keep using yt-dlp anyway)
  channel_live_url: "https://www.youtube.com/@YOUR_HANDLE/live"
  yt_dlp_timeout_seconds: 30        # hard timeout on each yt-dlp call so a hung
                                     # extraction can't wedge the polling timer
  poll_interval_seconds: 180
  grace_period_after_restart_seconds: 300   # suppress alerts this long after any (re)start
  grace_period_after_rotation_seconds: 480  # must exceed rotation min_gap_seconds plus
                                             # YouTube's own go-live latency; see FR14
  max_restarts_before_escalation: 3         # FR7e threshold
  backoff_ceiling_seconds: 1800             # FR7e: max restart backoff once escalation
                                             # is exhausted or unavailable

reencode:
  enabled: false
  codec: libx265
  preset: faster
  crf: 26

# Tier 2 (FR15, optional): YouTube Data API rotation + FR7e last-resort
# recovery. Requires its own venv (api/venv/) and a one-time interactive
# OAuth consent - see docs/TIER2.md. Everything above works fully without
# this section; leave tier2.enabled: false to stay on Tier 1 alone.
tier2:
  enabled: false
  client_secret_file: /etc/pigeoncam/tier2_client_secret.json  # from Google Cloud Console, chmod 600, never in git
  token_file: /etc/pigeoncam/tier2_token.json                  # written by `api/rotate_via_api.py --authorize`, chmod 600, never in git
  persistent_stream_id: ""          # the liveStreams resource id to bind new broadcasts to -
                                     # find it in Studio's stream settings, or via
                                     # `api/rotate_via_api.py --list-streams` after authorizing
  broadcast_title: "Nest camera - live"
  broadcast_description: ""
  privacy_status: public            # public | unlisted | private
  category_id: ""                   # empty = leave unset (channel/account default applies).
                                     # e.g. "15" = Pets & Animals - see
                                     # https://developers.google.com/youtube/v3/docs/videoCategories/list
  made_for_kids: null               # true | false | null (null = don't send the field,
                                     # let the channel/account default apply)
  poll_stream_active_timeout_seconds: 120   # how long to wait for liveStreams.status.streamStatus
                                             # == active (step 5) before giving up on this rotation
  poll_stream_active_interval_seconds: 5
  state_file: /var/lib/pigeoncam/tier2_state.json   # tracks the current broadcast id across
                                                   # rotations/reboots - persistent storage,
                                                   # not /run (tmpfs)
  oauth_redirect_port: 8090         # local port `--authorize` listens on for the OAuth
                                     # redirect; forward it over SSH for a headless host
                                     # (ssh -L 8090:localhost:8090 ...)
